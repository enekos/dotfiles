# ==========================================
#  TMUX CONFIGURATION & KEYBOARD SHORTCUTS
# ==========================================

# ------------------------------------------
# 1. GENERAL SETTINGS
# ------------------------------------------

# Set true color support
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reduce escape time delay (fixes delay when hitting ESC in Neovim)
set -sg escape-time 10

# ------------------------------------------
# 2. PREFIX KEY
# ------------------------------------------

# Unbind the default prefix (Ctrl-b) and set it to Ctrl-a
unbind C-b
set -g prefix C-a

# Press Ctrl-a twice to send Ctrl-a to an application inside tmux
bind C-a send-prefix

# ------------------------------------------
# 3. PANES: SPLITTING & NAVIGATION
# ------------------------------------------

# Split panes using | (vertical) and - (horizontal)
# Panes will open in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L   # Move to left pane
bind j select-pane -D   # Move to pane below
bind k select-pane -U   # Move to pane above
bind l select-pane -R   # Move to right pane

# Resize panes using Shift + Arrow keys
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5

# ------------------------------------------
# 4. WINDOWS: MANAGEMENT & NAVIGATION
# ------------------------------------------

# Create a new window in the current directory
bind c new-window -c "#{pane_current_path}"

# Navigate between windows using Shift + Left/Right arrows
bind -n S-Left previous-window
bind -n S-Right next-window

# ------------------------------------------
# 5. COPY MODE (VIM BINDINGS)
# ------------------------------------------

# Use vi keybindings in copy mode (Prefix + [ to enter copy mode)
set-window-option -g mode-keys vi

# Start selecting text with 'v', copy with 'y'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Do not exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# ------------------------------------------
# 6. CONFIGURATION RELOAD
# ------------------------------------------

# Reload this tmux config file with Prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# ==========================================
#  QUICK REFERENCE (DEFAULT + CUSTOM CHEAT SHEET)
# ==========================================
#
# Note: "Prefix" is Ctrl + a
#
# SESSIONS
# --------
# Prefix + d      : Detach from current session
# tmux ls         : List running tmux sessions
# tmux a          : Attach to the last session
# Prefix + s      : List sessions (interactive)
# Prefix + $      : Rename current session
#
# WINDOWS (Tabs)
# --------------
# Prefix + c      : Create a new window
# Prefix + w      : List all windows
# Prefix + ,      : Rename current window
# Prefix + p / n  : Go to previous / next window
# Prefix + 1..9   : Go to window number 1..9
# Prefix + &      : Kill current window
# Shift + Left/Rt : Previous / next window (No prefix needed)
#
# PANES (Splits)
# --------------
# Prefix + |      : Split pane vertically (left/right)
# Prefix + -      : Split pane horizontally (top/bottom)
# Prefix + h/j/k/l: Move around panes (vim style)
# Prefix + x      : Kill current pane
# Prefix + z      : Toggle maximize current pane (zoom)
# Prefix + Space  : Cycle through pane layouts
#
# MISC
# ----
# Prefix + [      : Enter copy mode (use vi keys to move, 'v' to select, 'y' to yank)
# Prefix + ]      : Paste yanked text
# Prefix + r      : Reload tmux configuration
